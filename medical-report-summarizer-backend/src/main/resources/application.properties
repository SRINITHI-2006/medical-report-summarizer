# ==========================================
# Server
# ==========================================

server.port=${PORT:8080}
spring.application.name=medical-report-summarizer

# ==========================================
# Database
# ==========================================
# Production:
#   Set DB_URL, DB_USERNAME, and DB_PASSWORD
#
# Local (default):
#   Uses H2 database if no environment variables are provided.

spring.datasource.url=${DB_URL:${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/medical_report_db;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}}
spring.datasource.username=${DB_USERNAME:${SPRING_DATASOURCE_USERNAME:sa}}
spring.datasource.password=${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

# Uncomment this only if you are always using MySQL
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# File Upload
# ==========================================

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.upload.dir=${UPLOAD_DIR:uploads}

# ==========================================
# JWT
# ==========================================

app.jwt.secret=${JWT_SECRET:MedicalReportSummarizerSecretKeyForJWTTokenGenerationMustBeLongEnough2024}
app.jwt.expiration-ms=86400000

# ==========================================
# Google Gemini API
# ==========================================

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

# ==========================================
# CORS
# ==========================================

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177,http://localhost:3000}
